services:
  fetcher:
    build:
      context: /home/daravenrk/dragonlair/agent_stack
      dockerfile: Dockerfile.fetcher
    container_name: fetcher
    restart: unless-stopped
    command: ["--serve", "--bind", "0.0.0.0", "--port", "11999", "--out-dir", "/app/research"]
    ports:
      - "0.0.0.0:11999:11999"
    volumes:
      - /home/daravenrk/dragonlair/book_project/01_research:/app/research
    environment:
      FETCHER_OUTPUT_DIR: /app/research
      FETCHER_TIMEOUT_SECONDS: "30"
