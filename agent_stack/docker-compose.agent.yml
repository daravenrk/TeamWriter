services:
  dragonlair_agent_stack:
    build:
      context: /home/daravenrk/dragonlair/agent_stack
    container_name: dragonlair_agent_stack
    restart: unless-stopped
    ports:
      - "0.0.0.0:11888:11888"
    environment:
      OLLAMA_AMD_ENDPOINT: "http://ollama_amd:11434"
      OLLAMA_NVIDIA_ENDPOINT: "http://ollama_nvidia:11434"
      AGENT_SERVER_MODE: "openclaw-client"
      AGENT_STRICT_MODE_VALIDATION: "true"
      DRAGONLAIR_LOCK_ROOT: "/tmp/dragonlair_agent_stack"
      AGENT_MAX_WORKERS: "4"
      STRICT_ONE_MODEL_PER_ROUTE: "true"
      AGENT_CALL_TIMEOUT_SECONDS: "180"
      AGENT_CALL_TIMEOUT_SECONDS_AMD: "900"
      AGENT_CALL_TIMEOUT_SECONDS_NVIDIA: "900"
      AGENT_OLLAMA_HTTP_TIMEOUT_SECONDS: "900"
      AGENT_ROUTE_MAX_INFLIGHT_AMD: "1"
      AGENT_ROUTE_MAX_INFLIGHT_NVIDIA: "3"
      AGENT_ENDPOINT_MAX_INFLIGHT_AMD: "1"
      AGENT_ENDPOINT_MAX_INFLIGHT_NVIDIA: "3"
      AGENT_BLOCK_CPU_BACKEND: "true"
      AGENT_FORCE_FULL_GPU_LAYERS: "true"
      BOOK_QUALITY_MIN_SCORE: "3.0"
      BOOK_QUALITY_MIN_AVG_SCORE: "3.0"
      BOOK_QUALITY_MIN_CONTENT_SCORE: "2.5"
      BOOK_QUALITY_ADAPTIVE_ENABLED: "true"
      BOOK_QUALITY_ADAPTIVE_ALPHA: "0.2"
      BOOK_QUALITY_ADAPTIVE_GAIN: "0.5"
      BOOK_QUALITY_ADAPTIVE_WARMUP_RUNS: "3"
      BOOK_QUALITY_ADAPTIVE_MAX_SCORE: "4.5"
      BOOK_QUALITY_ADAPTIVE_MAX_CONTENT_SCORE: "4.0"
      AGENT_NVIDIA_NUM_GPU_DEFAULT: "-1"
      AGENT_AMD_NUM_GPU_DEFAULT: "-1"
      AGENT_NVIDIA_NUM_GPU_BY_MODEL: '{"qwen3.5:4b":-1,"qwen3.5:2b":-1,"qwen3.5:0.8b":-1,"qwen2.5-coder:3b":-1,"qwen2.5-coder:1.5b":-1,"llama3.2:3b":-1,"llama3.2:1b":-1,"codegemma:2b":-1}'
      AGENT_NVIDIA_MAX_CTX_BY_MODEL: '{"qwen3.5:4b":8192,"qwen3.5:2b":65536,"qwen3.5:0.8b":131072}'
      AGENT_AMD_NUM_GPU_BY_MODEL: '{"qwen3.5:27b":-1,"qwen2.5-coder:14b":-1,"qwen3.5:9b":-1,"llama3.1:8b":-1}'
      AGENT_AMD_GPU_COUNT: "2"
      AGENT_AMD_MAIN_GPU: "0"
      AGENT_AMD_TENSOR_SPLIT: "0.5,0.5"
      AGENT_NVIDIA_ROUTE_NAME: "ollama_nvidia"
      AGENT_NVIDIA_ALLOW_MIXED_TINY_MODELS: "true"
      AGENT_NVIDIA_TINY_MAX_ACTIVE_MODELS: "2"
      AGENT_NVIDIA_TINY_MODELS: "qwen3.5:4b,qwen3.5:2b,qwen3.5:0.8b,qwen2.5-coder:3b,qwen2.5-coder:1.5b,llama3.2:3b,llama3.2:1b,codegemma:2b"
      AGENT_DEFAULT_MODEL_OLLAMA_AMD: "qwen3.5:27b"
      AGENT_DEFAULT_MODEL_OLLAMA_NVIDIA: "qwen3.5:4b"
      AGENT_PROFILE_QUALITY_FALLBACKS: '{"book-proofreader":{"fallback_route":"ollama_nvidia","fallback_model":"qwen3.5:4b","min_chars":250,"min_ratio":0.3,"suspicious_phrases":["please provide","share the text","need the text","i need the chapter","as an ai"]},"book-copy-editor":{"fallback_route":"ollama_amd","fallback_model":"qwen3.5:9b","min_chars":300,"min_ratio":0.33,"suspicious_phrases":["please provide","share the text","need the text","as an ai"]},"book-line-editor":{"fallback_route":"ollama_amd","fallback_model":"qwen3.5:9b","min_chars":350,"min_ratio":0.33,"suspicious_phrases":["please provide","share the text","need the text","as an ai"]},"book-publisher":{"fallback_route":"ollama_amd","fallback_model":"qwen3.5:27b","min_chars":180,"required_terms":["APPROVE","REVISE"],"suspicious_phrases":["please provide","share the text","need the text","as an ai"]}}'
      AGENT_AMD_EPHEMERAL_OVERRIDE_ENABLED: "true"
      AGENT_AMD_EPHEMERAL_OVERRIDE_MODELS: "qwen2.5-coder:14b,qwen3.5:9b"
      AGENT_ENABLE_CROSS_ROUTE_FALLBACK: "false"
      OPENCLAW_FAST_PROFILE: "nvidia-fast"
      OPENCLAW_DEEP_PROFILE: "amd-writer"
      OPENCLAW_TOOL_PROFILE: "nvidia-lowlatency"
      OPENCLAW_PRIORITY_PROFILE: "nvidia-fast"
      OPENCLAW_PRIORITY_BY_DEFAULT: "true"
      OPENCLAW_PRIORITY_MODELS: "qwen3.5:4b,qwen3.5:2b,qwen3.5:0.8b,dragonlair-active:latest"
      OPENCLAW_MODEL_PROFILE_MAP: "{\"qwen3.5:4b\":\"nvidia-fast\",\"qwen3.5:2b\":\"joke-it-guy\",\"qwen3.5:0.8b\":\"joke-it-guy\",\"qwen2.5-coder:3b\":\"nvidia-lowlatency\",\"qwen3.5:27b\":\"amd-writer\",\"qwen2.5-coder:14b\":\"amd-longctx\",\"qwen3.5:9b\":\"amd-qwen35-9b-highctx\"}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/daravenrk/dragonlair/agent_stack/agent_profiles:/app/agent_stack/agent_profiles:rw
      - /home/daravenrk/dragonlair/agent_stack/static:/app/agent_stack/static:rw
      - /home/daravenrk/dragonlair/book_project:/home/daravenrk/dragonlair/book_project:rw
    networks:
      - dragonlair-net

networks:
  dragonlair-net:
    external: true
